kind: Route
apiVersion: route.openshift.io/v1
metadata:
  name: aap-external
  annotations:
    # Default cert only covers apps.ocp-home.rh-lab.morey.tech, so this needs a custom one.
    # Uses cert-manager/openshift-routes annotations.
    # https://github.com/cert-manager/openshift-routes?tab=readme-ov-file#usage
    cert-manager.io/issuer-kind: ClusterIssuer
    cert-manager.io/issuer-name: letsencrypt-prod
spec:
  host: aap.ocp-gpu.morey.tech
  path: /
  to:
    kind: Service
    name: aap
    weight: 100
  port:
    targetPort: http
  tls:
    termination: edge
  wildcardPolicy: None
---
apiVersion: externaldns.k8s.io/v1alpha1
kind: DNSEndpoint
metadata:
  name: aap-ocp-gpu-morey-tech
  annotations:
    external-dns.alpha.kubernetes.io/include: 'true'
spec:
  endpoints:
  - dnsName: aap.ocp-gpu.morey.tech
    recordTTL: 300
    recordType: CNAME
    targets:
    - home.morey.tech
    # Provider specific configurations are set like an annotation would on other sources
    providerSpecific:
      - name: external-dns.alpha.kubernetes.io/cloudflare-proxied
        value: "true"